<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbondz Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="auth-wrapper" id="authContainer"></div>
    <main class="search-layout">
        <h1 class="brand-logo">inbondz</h1>
        <p class="brand-tagline">The Decentralized Index</p>
        <div class="input-group">
            <input type="text" id="searchInput" placeholder="Search keywords..." autocomplete="off">
            <div id="loader" class="spinner hidden"></div>
        </div>
        <div id="statusMsg" class="status-box"></div>
        <div id="resultsList" class="scroll-area"></div>
    </main>
    <div id="limitModal" class="modal-backdrop hidden">
        <div class="modal-body">
            <span class="modal-icon">⚠️</span>
            <h2>Daily Limit Reached</h2>
            <p>We've hit the 100k daily login cap. Public search still works, but high-limit sessions reset at 00:00 UTC.</p>
            <button onclick="closeModal()">Got it</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
