<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbondz AI | Theological & Psychological Node</title>
    <link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #0f1115; --bg-panel: #1a1d24; --bg-hover: #2a2d35; --text-primary: #F8FAFC; --text-secondary: #94A3B8; --accent-cyan: #00E5FF; --border-dim: rgba(255, 255, 255, 0.1); font-family: 'Inter', sans-serif; }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background-color: var(--bg-base); color: var(--text-primary); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* AUTH GATE */
        #auth-gate { position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; background: var(--bg-base); padding: 24px; }
        .auth-panel { background: var(--bg-panel); border: 1px solid var(--border-dim); border-radius: 24px; padding: 40px 30px; width: 100%; max-width: 400px; text-align: center; }
        .btn-github { display: flex; align-items: center; justify-content: center; width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 32px; font-size: 1rem; }

        /* LAYOUT */
        #app-root { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* SIDEBAR */
        #sidebar { width: 280px; background: var(--bg-panel); border-right: 1px solid var(--border-dim); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 100; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border-dim); display: flex; justify-content: space-between; align-items: center; }
        .new-chat-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .new-chat-btn:hover { background: rgba(0, 229, 255, 0.1); }
        .chat-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { padding: 12px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; color: var(--text-secondary); transition: 0.2s; }
        .chat-item:hover, .chat-item.active { background: var(--bg-hover); color: var(--text-primary); }
        .chat-actions button { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; margin-left: 6px; font-size: 1rem; }
        .chat-actions button:hover { color: var(--text-primary); }

        /* MAIN CHAT AREA */
        #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border-dim); background: var(--bg-base); }
        .nav-left { display: flex; align-items: center; gap: 16px; }
        .menu-toggle { background: transparent; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; display: none; }
        .brand-logo { font-family: 'Carter One', cursive; font-size: 1.5rem; color: #fff; }
        .profile-container { position: relative; }
        .nav-avatar { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--accent-cyan); cursor: pointer; object-fit: cover; }
        
        /* DROPDOWN */
        .dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 10px; background: var(--bg-panel); border: 1px solid var(--border-dim); border-radius: 8px; overflow: hidden; min-width: 150px; z-index: 200; }
        .dropdown.show { display: block; }
        .drop-btn { width: 100%; padding: 12px 16px; text-align: left; background: transparent; border: none; color: #fff; cursor: pointer; border-bottom: 1px solid var(--border-dim); }
        .drop-btn:hover { background: var(--bg-hover); }
        .drop-btn.danger { color: #ff4444; border-bottom: none; }

        /* MESSAGES */
        #chat-history { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; }
        .bubble { max-width: 80%; padding: 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; position: relative; }
        .msg-row.user .bubble { background: #2a2d35; border-bottom-right-radius: 4px; }
        .msg-row.ai .bubble { background: transparent; border: 1px solid var(--border-dim); border-bottom-left-radius: 4px; }
        
        .edit-btn { position: absolute; top: -10px; right: -10px; background: var(--bg-panel); border: 1px solid var(--border-dim); border-radius: 50%; width: 24px; height: 24px; cursor: pointer; color: #fff; display: none; font-size: 0.7rem; justify-content: center; align-items: center; }
        .msg-row.user:hover .edit-btn { display: flex; }

        /* INPUT AREA */
        .input-container { padding: 24px; background: var(--bg-base); border-top: 1px solid var(--border-dim); }
        .input-box { display: flex; gap: 12px; background: var(--bg-panel); border: 1px solid var(--border-dim); padding: 8px 16px; border-radius: 16px; align-items: flex-end; }
        .chat-input { flex: 1; background: transparent; border: none; color: #fff; outline: none; resize: none; max-height: 150px; padding: 8px 0; font-family: inherit; font-size: 1rem; }
        .action-btns { display: flex; gap: 8px; padding-bottom: 8px; }
        .send-btn, .stop-btn { background: #fff; color: #000; border: none; width: 36px; height: 36px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .stop-btn { background: #ff4444; color: #fff; display: none; }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); width: 280px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
            #sidebar.open { transform: translateX(0); }
            .bubble { max-width: 95%; }
        }
    </style>
    
    <style>

        --bg-base: #0f1115; 
        --bg-panel: #1a1d24; 
        --bg-hover: #2a2d35; 
        --text-primary: #F8FAFC;

        --accent-cyan: #00E5FF; 
        --border-dim: rgba(255, 255, 255, 0.1); 
        font-family: 'Inter', sans-serif; 
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* Ensure the app takes the full height but respects mobile keyboards */
    html, body { 
        background-color: var(--bg-base); 
        color: var(--text-primary); 
        height: 100dvh; /* Dynamic viewport height for mobile */
        overflow: hidden; 
        display: flex; 
        flex-direction: column; 
    }

    /* AUTH GATE */
    #auth-gate { position: fixed; inset: 0; z-index: 10000; display: flex; justify-content: center; align-items: center; background: var(--bg-base); padding: 24px; }
    .auth-panel { background: var(--bg-panel); border: 1px solid var(--border-dim); border-radius: 24px; padding: 40px 30px; width: 100%; max-width: 400px; text-align: center; }
    .btn-github { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 32px; font-size: 1.1rem; }

    /* LAYOUT CORE */
    #app-root { flex: 1; display: flex; overflow: hidden; position: relative; }
    
    /* SIDEBAR */
    #sidebar { 
        width: 280px; 
        background: var(--bg-panel); 
        border-right: 1px solid var(--border-dim); 
        display: flex; 
        flex-direction: column; 
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        z-index: 2000; /* Sidebar must be high */
    }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-dim); }
    .new-chat-btn { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); border-radius: 12px; font-weight: 700; cursor: pointer; }
    .chat-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .chat-item { padding: 14px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); font-size: 0.95rem; color: var(--text-secondary); }
    .chat-item.active { background: var(--bg-hover); color: var(--text-primary); border-left: 3px solid var(--accent-cyan); }

    /* MAIN CONTENT */
    #main-chat { flex: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
    
    header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 12px 20px; 
        height: 64px; 
        border-bottom: 1px solid var(--border-dim); 
        background: var(--bg-base); 
        z-index: 1000;
    }
    .menu-toggle { padding: 10px; background: transparent; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; display: none; }
    .brand-logo { font-family: 'Carter One', cursive; font-size: 1.4rem; color: #fff; }
    .nav-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent-cyan); cursor: pointer; }

    /* CHAT HISTORY */
    #chat-history { 
        flex: 1; 
        overflow-y: auto; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        gap: 20px; 
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
    }
    .msg-row { display: flex; width: 100%; margin-bottom: 10px; }
    .msg-row.user { justify-content: flex-end; }
    .bubble { 
        max-width: 85%; 
        padding: 16px 20px; 
        border-radius: 18px; 
        font-size: 1rem; 
        line-height: 1.5; 
        word-wrap: break-word; 
    }
    .msg-row.user .bubble { background: #31363f; border-bottom-right-radius: 4px; }
    .msg-row.ai .bubble { background: rgba(255,255,255,0.05); border: 1px solid var(--border-dim); border-bottom-left-radius: 4px; }

    /* INPUT AREA - THE CRITICAL FIX */
    .input-container { 
        padding: 16px 20px 32px 20px; /* Extra bottom padding for safe area */
        background: var(--bg-base); 
        border-top: 1px solid var(--border-dim); 
    }
    .input-box { 
        display: flex; 
        gap: 12px; 
        background: var(--bg-panel); 
        border: 1px solid var(--border-dim); 
        padding: 10px 14px; 
        border-radius: 20px; 
        align-items: center; /* Center buttons vertically */
    }

        flex: 1;

    /* MOBILE ADJUSTMENTS */

            position: absolute;

            max-width: 300px;
        }
        #sidebar.open { transform: translateX(0); }
        .bubble { max-width: 92%; }
    }
</style>

<body>
    <aside id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="ChatUI.startNewChat()">+ New Session</button>
        </div>
        <div class="chat-list" id="sidebar-list"></div>
    </aside>
</body>












    

    <script>
        // --- 1. CONFIGURATION ---
        const API_BASE = ""; // Cloaked routing via Cloudflare Custom Routes
        const CLIENT_ID = "Ov23liJJsDe8t4Amjn8z"; // YOUR GITHUB CLIENT ID
        
        const AppState = { 
            token: null, 
            user: null,
            currentChatId: null,
            abortController: null 
        };

        // --- AUTH SYSTEM ---
        const AuthSystem = (() => {
            const init = async () => {
                const token = localStorage.getItem('inb_ai_token');
                const user = localStorage.getItem('inb_ai_user');
                const code = new URLSearchParams(window.location.search).get('code');

                if (code) {
                    try {
                        const res = await fetch(`${API_BASE}/api/auth`, { method: 'POST', body: JSON.stringify({code}) });
                        const data = await res.json();
                        if (!res.ok) throw new Error();
                        
                        localStorage.setItem('inb_ai_token', data.access_token);
                        localStorage.setItem('inb_ai_user', JSON.stringify(data.user));
                        window.location.replace('/');
                    } catch(e) { alert("Authentication Failed"); window.location.replace('/'); }
                    return;
                }

                if (token && user) {
                    AppState.token = token;
                    AppState.user = JSON.parse(user);
                    document.getElementById('auth-gate').style.display = 'none';
                    document.getElementById('nav-avatar').src = AppState.user.avatar_url;
                    ChatUI.loadSidebar();
                }
            };

            const triggerAuth = () => {
                window.location.href = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&scope=read:user`;
            };
            
            const logout = () => { localStorage.clear(); window.location.reload(); };
            
            const deleteAccount = async () => {
                if(confirm("Permanently destroy your AI Node? All chats will be wiped.")) {
                    await fetch(`${API_BASE}/api/delete`, { 
                        method: 'POST', 
                        headers: { 'Authorization': `Bearer ${AppState.token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: 'account' })
                    });
                    logout();
                }
            };

            return { init, triggerAuth, logout, deleteAccount };
        })();

        // --- UI HANDLERS ---
        const UI = (() => {
            const toggleSidebar = () => {
                const sb = document.getElementById('sidebar');
                sb.classList.toggle('open');
            };
            const toggleDropdown = () => {
                document.getElementById('profile-dropdown').classList.toggle('show');
            };
            // Close dropdown if clicked outside
            window.onclick = (e) => {
                if (!e.target.matches('.nav-avatar')) {
                    document.getElementById('profile-dropdown').classList.remove('show');
                }
            };
            return { toggleSidebar, toggleDropdown };
        })();

        // --- CHAT INTERFACE & ENGINE ---
        const ChatUI = (() => {
            const loadSidebar = async () => {
                const res = await fetch(`${API_BASE}/api/chats`, { headers: { 'Authorization': `Bearer ${AppState.token}` }});
                const chats = await res.json();
                
                const list = document.getElementById('sidebar-list');
                list.innerHTML = '';
                chats.forEach(c => {
                    const el = document.createElement('div');
                    el.className = `chat-item ${c.id === AppState.currentChatId ? 'active' : ''}`;
                    el.innerHTML = `
                        <span onclick="ChatUI.loadChat('${c.id}')">${c.is_pinned ? '📌 ' : ''}${c.title}</span>
                        <div class="chat-actions">
                            <button onclick="ChatEngine.pinChat('${c.id}', ${!c.is_pinned}, event)">${c.is_pinned ? '📍' : '📌'}</button>
                            <button onclick="ChatEngine.deleteChat('${c.id}', event)">🗑</button>
                        </div>
                    `;
                    list.appendChild(el);
                });
            };

            const startNewChat = () => {
                AppState.currentChatId = null;
                document.getElementById('chat-history').innerHTML = `
                    <div style="text-align:center; color:var(--text-secondary); margin-top: 40px;">
                        <h2>Inbondz AI Active</h2>
                        <p style="margin-top:10px; font-size:0.9rem;">Ask a question to begin.</p>
                    </div>`;
                document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                if(window.innerWidth <= 768) UI.toggleSidebar();
            };

            const loadChat = async (id) => {
                AppState.currentChatId = id;
                if(window.innerWidth <= 768) UI.toggleSidebar();
                loadSidebar(); // refresh active state

                const res = await fetch(`${API_BASE}/api/chat/${id}`, { headers: { 'Authorization': `Bearer ${AppState.token}` }});
                const msgs = await res.json();
                
                const box = document.getElementById('chat-history');
                box.innerHTML = '';
                msgs.forEach(m => appendMessage(m.role, m.content));
                box.scrollTop = box.scrollHeight;
            };

            const appendMessage = (role, content) => {
                const box = document.getElementById('chat-history');
                const row = document.createElement('div');
                row.className = `msg-row ${role === 'user' ? 'user' : 'ai'}`;
                
                let editHtml = role === 'user' ? `<button class="edit-btn" onclick="ChatUI.editPrompt(this)">✎</button>` : '';
                
                row.innerHTML = `<div class="bubble">${editHtml}<span>${content}</span></div>`;
                box.appendChild(row);
                box.scrollTop = box.scrollHeight;
            };

            const editPrompt = (btn) => {
                const text = btn.nextElementSibling.innerText;
                document.getElementById('chat-input').value = text;
                document.getElementById('chat-input').focus();
            };

            return { loadSidebar, startNewChat, loadChat, appendMessage, editPrompt };
        })();

        const ChatEngine = (() => {
            const sendMessage = async () => {
                const input = document.getElementById('chat-input');
                const text = input.value.trim();
                if(!text) return;

                // UI Reset
                input.value = '';
                input.style.height = '';
                ChatUI.appendMessage('user', text);
                
                // If it was the placeholder screen, clear it
                if(document.querySelector('#chat-history h2')) {
                    document.getElementById('chat-history').innerHTML = '';
                    ChatUI.appendMessage('user', text);
                }

                // Show Stop Button, Hide Send Button
                document.getElementById('send-btn').style.display = 'none';
                document.getElementById('stop-btn').style.display = 'flex';

                // Setup Abort Controller for "Stop" functionality
                AppState.abortController = new AbortController();

                // Add loading indicator
                const box = document.getElementById('chat-history');
                const loadRow = document.createElement('div');
                loadRow.className = 'msg-row ai';
                loadRow.id = 'loading-bubble';
                loadRow.innerHTML = `<div class="bubble" style="color: var(--text-secondary);">Synthesizing logic...</div>`;
                box.appendChild(loadRow);
                box.scrollTop = box.scrollHeight;

                try {
                    const res = await fetch(`${API_BASE}/api/ask`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${AppState.token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chatId: AppState.currentChatId, prompt: text }),
                        signal: AppState.abortController.signal
                    });
                    
                    document.getElementById('loading-bubble').remove();
                    
                    if (res.ok) {
                        const data = await res.json();
                        AppState.currentChatId = data.chatId;
                        ChatUI.appendMessage('assistant', data.reply);
                        ChatUI.loadSidebar(); // Refresh to show new chat title
                    }
                } catch (e) {
                    if (e.name === 'AbortError') {
                        document.getElementById('loading-bubble').innerHTML = `<div class="bubble" style="color: #ff4444;">Generation halted by user.</div>`;
                    } else {
                        document.getElementById('loading-bubble').innerHTML = `<div class="bubble" style="color: #ff4444;">API Error. Node unresponsive.</div>`;
                    }
                } finally {
                    // Reset Buttons
                    document.getElementById('send-btn').style.display = 'flex';
                    document.getElementById('stop-btn').style.display = 'none';
                    AppState.abortController = null;
                }
            };

            const abortGeneration = () => {
                if (AppState.abortController) {
                    AppState.abortController.abort();
                }
            };

            const deleteChat = async (id, e) => {
                e.stopPropagation();
                if(!confirm("Erase this session?")) return;
                await fetch(`${API_BASE}/api/delete`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${AppState.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'chat', targetId: id })
                });
                if(AppState.currentChatId === id) ChatUI.startNewChat();
                ChatUI.loadSidebar();
            };

            const pinChat = async (id, isPinned, e) => {
                e.stopPropagation();
                await fetch(`${API_BASE}/api/pin`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${AppState.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId: id, isPinned })
                });
                ChatUI.loadSidebar();
            };

            return { sendMessage, abortGeneration, deleteChat, pinChat };
        })();

        // Enter to send
        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                ChatEngine.sendMessage();
            }
        });

        document.addEventListener('DOMContentLoaded', AuthSystem.init);
    </script>
</body>
</html>
