<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Inbondz | The Developer Network</title>
    
    <link rel="icon" type="image/png" href="/favicon.png?v=2">
    <link rel="apple-touch-icon" href="/favicon.png?v=2">
    <meta name="theme-color" content="#9ea3a3">

    <link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-base: #ffffff; --bg-panel: #f8f9fa; --bg-hover: #e8eaed; 
            --text-primary: #202124; --text-secondary: #5f6368; 
            --border-dim: #dfe1e5; --brand-color: #9ea3a3; 
            font-family: 'Inter', sans-serif; 
        }
        @media (prefers-color-scheme: dark) {
            :root { 
                --bg-base: #0a0c10; --bg-panel: #14171f; --bg-hover: #1f232e; 
                --text-primary: #F8FAFC; --text-secondary: #94A3B8; 
                --border-dim: rgba(255, 255, 255, 0.08); 
            }
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-base); color: var(--text-primary); min-height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; position: sticky; top: 0; background: var(--bg-base); z-index: 1000; border-bottom: 1px solid var(--border-dim); }
        .brand-logo { font-family: 'Carter One', cursive; font-size: 1.6rem; color: var(--brand-color); cursor: pointer; text-decoration: none; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        
        .icon-btn { background: transparent; border: none; cursor: pointer; color: var(--text-primary); display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: 0.2s; }
        .icon-btn:hover { background: var(--bg-hover); }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        
        .nav-avatar { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; object-fit: cover; display: none; border: 2px solid transparent; }
        .nav-avatar:hover { border-color: var(--brand-color); }
        
        .btn-ghost { background: transparent; color: var(--text-primary); border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
        .btn-solid { background: var(--text-primary); color: var(--bg-base); border: none; padding: 8px 18px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }

        /* DROPDOWN */
        .dropdown { display: none; position: absolute; top: 60px; right: 24px; background: var(--bg-panel); border: 1px solid var(--border-dim); border-radius: 12px; overflow: hidden; width: 220px; z-index: 3000; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .dropdown.show { display: block; }
        .drop-btn { width: 100%; padding: 14px 16px; text-align: left; background: transparent; border: none; color: var(--text-primary); font-size: 0.95rem; cursor: pointer; border-bottom: 1px solid var(--border-dim); font-weight: 500; }
        .drop-btn:hover { background: var(--bg-hover); }

        /* SEARCH OVERLAY */
        #search-overlay { display: none; position: fixed; inset: 0; background: var(--bg-base); z-index: 2000; flex-direction: column; }
        .search-header { padding: 16px 24px; border-bottom: 1px solid var(--border-dim); display: flex; gap: 12px; align-items: center; }
        .search-input { flex: 1; background: var(--bg-panel); border: none; padding: 12px 16px; border-radius: 20px; color: var(--text-primary); font-size: 1rem; outline: none; }
        #search-results { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 12px; }
        .search-user-card { display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: 12px; cursor: pointer; text-decoration: none; color: var(--text-primary); transition: 0.2s; }
        .search-user-card:hover { background: var(--bg-hover); }
        .search-user-card img { width: 48px; height: 48px; border-radius: 50%; }

        /* PROFILE VIEW */
        #view-profile { display: none; flex-direction: column; align-items: center; padding: 40px 20px; max-width: 600px; margin: 0 auto; width: 100%; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 16px; object-fit: cover; border: 3px solid var(--bg-panel); }
        .profile-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; text-align: center; }
        .profile-username { color: var(--text-secondary); margin-bottom: 16px; font-size: 1rem; }
        .profile-bio { text-align: center; line-height: 1.5; margin-bottom: 32px; font-size: 1.05rem; }
        
        .link-btn { display: flex; justify-content: center; align-items: center; width: 100%; padding: 18px; background: var(--bg-panel); border: 1px solid var(--border-dim); border-radius: 16px; color: var(--text-primary); text-decoration: none; font-weight: 600; margin-bottom: 12px; transition: 0.2s; }
        .link-btn:hover { background: var(--bg-hover); transform: translateY(-2px); }
        .edit-profile-btn { margin-top: 24px; padding: 12px 24px; background: transparent; border: 2px solid var(--text-primary); color: var(--text-primary); border-radius: 24px; font-weight: 600; cursor: pointer; display: none; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-box { background: var(--bg-base); width: 100%; max-width: 450px; border-radius: 24px; padding: 32px; border: 1px solid var(--border-dim); display: flex; flex-direction: column; gap: 16px; }
        .modal-title { font-size: 1.5rem; font-weight: 700; }
        .modal-input { width: 100%; padding: 14px; background: var(--bg-panel); border: 1px solid var(--border-dim); border-radius: 12px; color: var(--text-primary); font-size: 1rem; outline: none; }
        textarea.modal-input { resize: vertical; min-height: 100px; }
        .modal-btn-row { display: flex; gap: 12px; margin-top: 16px; }
        .btn-primary { flex: 1; padding: 14px; background: var(--text-primary); color: var(--bg-base); border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-secondary { flex: 1; padding: 14px; background: transparent; color: var(--text-primary); border: 1px solid var(--border-dim); border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="/" class="brand-logo" onclick="Router.navigate('/'); return false;">Inbondz</a>
        <div class="nav-right">
            <button class="icon-btn" onclick="UI.openSearch()">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <div id="auth-buttons" style="display: flex; gap: 8px;">
                <button class="btn-ghost" onclick="AuthSystem.triggerAuth()">Log In</button>
                <button class="btn-solid" onclick="AuthSystem.triggerAuth()">Sign Up</button>
            </div>
            <div style="position: relative;">
                <img src="" id="nav-avatar" class="nav-avatar" onclick="UI.toggleDropdown()">
                <div class="dropdown" id="profile-dropdown">
                    <button class="drop-btn" onclick="Router.navigate(`/${AppState.user.login}`); UI.toggleDropdown();">My Profile</button>
                    <button class="drop-btn" onclick="AuthSystem.logout()">Log Out</button>
                    <button class="drop-btn" style="color:#ff4444; border-bottom:none;" onclick="UI.openDeleteModal()">Delete Account</button>
                </div>
            </div>
        </div>
    </header>

    <div id="search-overlay">
        <div class="search-header">
            <button class="icon-btn" onclick="UI.closeSearch()">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <input type="text" id="search-input" class="search-input" placeholder="Search developers on GitHub..." autocomplete="off">
        </div>
        <div id="search-results"></div>
    </div>

    <main id="view-home" style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:20px; text-align:center;">
        <h1 class="brand-logo" style="font-size: 4rem; margin-bottom: 16px;">Inbondz</h1>
        <p style="color: var(--text-secondary); font-size: 1.1rem; max-width: 400px; margin-bottom: 32px;">Claim your developer identity. Build your unified profile.</p>
        <div id="home-cta-buttons" style="display: flex; gap: 16px; justify-content: center; width: 100%;">
            <button class="btn-solid" style="padding: 14px 28px; font-size: 1.1rem;" onclick="AuthSystem.triggerAuth()">Sign Up</button>
            <button class="btn-ghost" style="padding: 14px 28px; font-size: 1.1rem; border: 2px solid var(--border-dim);" onclick="AuthSystem.triggerAuth()">Log In</button>
        </div>
    </main>

    <div id="view-profile">
        <img src="" id="prof-avatar" class="profile-avatar">
        <div id="prof-name" class="profile-name"></div>
        <div id="prof-username" class="profile-username"></div>
        <div id="prof-bio" class="profile-bio"></div>
        <div id="prof-links" style="width: 100%; display: flex; flex-direction: column;"></div>
        <button id="edit-profile-btn" class="edit-profile-btn" onclick="UI.openEditModal()">Edit Profile</button>
    </div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-box">
            <h2 class="modal-title">Edit GitHub Info</h2>
            <p style="font-size: 0.9rem; color: var(--text-secondary);">This securely updates your native GitHub profile.</p>
            <input type="text" id="edit-name" class="modal-input" placeholder="Name">
            <textarea id="edit-bio" class="modal-input" placeholder="Bio"></textarea>
            <input type="text" id="edit-blog" class="modal-input" placeholder="Website / Portfolio Link">
            <div class="modal-btn-row">
                <button class="btn-secondary" onclick="UI.closeEditModal()">Cancel</button>
                <button class="btn-primary" onclick="AuthSystem.saveProfile()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay" style="z-index: 3100;">
        <div class="modal-box" style="border: 1px solid #ff4444;">
            <h2 class="modal-title" style="color: #ff4444;">Leave Inbondz?</h2>
            <p style="color: var(--text-secondary); line-height: 1.5;">This removes you from the Inbondz registry. Your GitHub account and repositories remain completely safe.</p>
            <input type="text" id="delete-confirm-input" class="modal-input" placeholder="Type DELETE to confirm">
            <div class="modal-btn-row">
                <button class="btn-secondary" onclick="UI.closeDeleteModal()">Cancel</button>
                <button class="btn-primary" style="background: #ff4444;" onclick="AuthSystem.confirmDelete()">Permanently Delete</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "/api"; 
        const CLIENT_ID = "Ov23liJJsDe8t4Amjn8z"; 
        let AppState = { token: localStorage.getItem('inb_token'), user: null, viewData: null };

        const Router = {
            navigate: (path) => {
                window.history.pushState({}, "", path);
                Router.resolve();
            },
            resolve: async () => {
                const path = window.location.pathname;
                document.getElementById('view-home').style.display = 'none';
                document.getElementById('view-profile').style.display = 'none';

                if (path === '/' || path === '/index.html') {
                    document.getElementById('view-home').style.display = 'flex';
                } else {
                    const username = path.substring(1).replace(/\/$/, "");
                    await loadProfileView(username);
                }
            }
        };

        const loadProfileView = async (username) => {
            document.getElementById('view-profile').style.display = 'flex';
            document.getElementById('prof-name').innerText = "Loading...";
            document.getElementById('prof-bio').innerText = "";
            document.getElementById('prof-links').innerHTML = "";
            document.getElementById('edit-profile-btn').style.display = 'none';

            try {
                // Fetch directly from GitHub ($0 Server Cost)
                const res = await fetch(`https://api.github.com/users/${username}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                AppState.viewData = data;
                document.getElementById('prof-avatar').src = data.avatar_url;
                document.getElementById('prof-name').innerText = data.name || data.login;
                document.getElementById('prof-username').innerText = `@${data.login}`;
                document.getElementById('prof-bio').innerText = data.bio || "";
                
                let linksHTML = '';
                if (data.blog) {
                    const blogUrl = data.blog.startsWith('http') ? data.blog : `https://${data.blog}`;
                    linksHTML += `<a href="${blogUrl}" target="_blank" class="link-btn">Website / Portfolio</a>`;
                }

                // Fetch Native GitHub Social Links
                const socialRes = await fetch(`https://api.github.com/users/${username}/social_accounts`);
                if(socialRes.ok) {
                    const socials = await socialRes.json();
                    socials.forEach(s => {
                        linksHTML += `<a href="${s.url}" target="_blank" class="link-btn">${s.provider}</a>`;
                    });
                }
                
                document.getElementById('prof-links').innerHTML = linksHTML;

                if (AppState.user && AppState.user.login.toLowerCase() === username.toLowerCase()) {
                    document.getElementById('edit-profile-btn').style.display = 'block';
                }
            } catch(e) {
                document.getElementById('prof-name').innerText = "User not found on GitHub.";
            }
        };

        const AuthSystem = (() => {
            const init = async () => {
                const code = new URLSearchParams(window.location.search).get('code');
                if (code) {
                    // This hits the Cloudflare Worker to exchange the code and register in D1
                    const res = await fetch(`${API_BASE}/auth`, { method: 'POST', body: JSON.stringify({code}) });
                    const data = await res.json();
                    if(!data.error) {
                        localStorage.setItem('inb_token', data.access_token);
                        window.history.replaceState({}, document.title, "/");
                        AppState.token = data.access_token;
                    }
                }

                if (AppState.token) {
                    // Verify directly with GitHub
                    const res = await fetch("https://api.github.com/user", { headers: { "Authorization": `Bearer ${AppState.token}` } });
                    if(res.ok) {
                        AppState.user = await res.json();
                        document.getElementById('auth-buttons').style.display = 'none';
                        document.getElementById('home-cta-buttons').style.display = 'none';
                        const avatar = document.getElementById('nav-avatar');
                        avatar.src = AppState.user.avatar_url;
                        avatar.style.display = 'block';
                    } else { localStorage.removeItem('inb_token'); }
                }
                Router.resolve();
            };

            const triggerAuth = () => { window.location.href = `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}&scope=read:user,user:email`; };
            const logout = () => { localStorage.clear(); window.location.href = '/'; };

            const saveProfile = async () => {
                const name = document.getElementById('edit-name').value;
                const bio = document.getElementById('edit-bio').value;
                const blog = document.getElementById('edit-blog').value;
                
                // Directly updates real GitHub profile via GitHub's API
                await fetch("https://api.github.com/user", {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${AppState.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, bio, blog })
                });
                
                UI.closeEditModal();
                loadProfileView(AppState.user.login); 
            };

            const confirmDelete = async () => {
                const input = document.getElementById('delete-confirm-input').value;
                if(input === "DELETE") {
                    // This hits the Cloudflare Worker to remove them from D1
                    await fetch(`${API_BASE}/delete`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${AppState.token}` } });
                    logout();
                } else { alert("Type DELETE to confirm"); }
            };

            return { init, triggerAuth, logout, saveProfile, confirmDelete };
        })();

        const UI = {
            openSearch: () => { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('search-input').focus(); },
            closeSearch: () => { document.getElementById('search-overlay').style.display = 'none'; },
            toggleDropdown: () => document.getElementById('profile-dropdown').classList.toggle('show'),
            openEditModal: () => {
                document.getElementById('edit-name').value = AppState.viewData.name || '';
                document.getElementById('edit-bio').value = AppState.viewData.bio || '';
                document.getElementById('edit-blog').value = AppState.viewData.blog || '';
                document.getElementById('edit-modal').style.display = 'flex';
            },
            closeEditModal: () => document.getElementById('edit-modal').style.display = 'none',
            openDeleteModal: () => { document.getElementById('delete-modal').style.display = 'flex'; document.getElementById('profile-dropdown').classList.remove('show'); },
            closeDeleteModal: () => { document.getElementById('delete-modal').style.display = 'none'; document.getElementById('delete-confirm-input').value = ''; }
        };

        // CLIENT-SIDE GITHUB SEARCH
        document.getElementById('search-input').addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            const resultsBox = document.getElementById('search-results');
            if(query.length < 3) return resultsBox.innerHTML = '';

            try {
                const res = await fetch(`https://api.github.com/search/users?q=${query}&per_page=10`);
                const data = await res.json();
                resultsBox.innerHTML = data.items.map(u => `
                    <a href="/${u.login}" class="search-user-card" onclick="UI.closeSearch(); Router.navigate('/${u.login}'); return false;">
                        <img src="${u.avatar_url}">
                        <div style="font-weight: 600;">@${u.login}</div>
                    </a>
                `).join('');
            } catch(e) {}
        });

        window.onclick = e => { if (!e.target.matches('.nav-avatar')) document.getElementById('profile-dropdown').classList.remove('show'); };
        window.addEventListener('popstate', Router.resolve);
        document.addEventListener('DOMContentLoaded', AuthSystem.init);
    </script>
</body>
</html>
