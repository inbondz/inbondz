<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Node Not Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        .error-layout {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #ff7b72, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .home-btn {
            margin-top: 30px;
            background: var(--link);
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .home-btn:hover { opacity: 0.8; }
    </style>
</head>
<body class="dark-theme">
    <div class="error-layout">
        <h1 class="error-code">404</h1>
        <h2>Lost in Decentralization?</h2>
        <p style="color: var(--dim)">The path you followed lead to a dead node.</p>
        <a href="/" class="home-btn">Back to Main Index</a>
    </div>
</body>
</html>
